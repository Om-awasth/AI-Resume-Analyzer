<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="auth-shell">
<nav class="navbar"><div class="container"><div class="nav-brand"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="AI Resume Analyzer logo" class="logo" /><h1>AI Resume Analyzer</h1></div></div></nav>
<section class="auth-wrap">
    <aside class="auth-info">
        <h2>🔁 Reset Flow</h2>
        <p>Verify your OTP before creating a new password.</p>
        <div class="auth-progress">
            <span class="step">1</span><span class="line"></span><span class="step active">2</span>
            <span>Request OTP → Verify & Reset</span>
        </div>
        <ul class="auth-checklist">
            <li>✓ Verify OTP first</li>
            <li>✓ Unlock password update step</li>
            <li>✓ Secure ticket-based reset</li>
        </ul>
    </aside>
    <div class="auth-glass">
        <h2>Reset Password</h2>
        <p class="auth-subtitle">Step 1: Verify OTP. Step 2: Set a new password.</p>
        <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
            <label>OTP</label>
            <input id="otp" type="text" maxlength="6" placeholder="6-digit OTP" />
        </div>
        <div class="form-group">
            <button id="verifyOtp" class="auth-btn">Verify OTP</button>
        </div>
        <div id="passwordSection" style="display:none;">
            <div class="form-group">
                <label>New Password</label>
                <input id="password" type="password" />
            </div>
            <div class="form-group">
                <button id="doReset" class="auth-btn">Set Password</button>
            </div>
        </div>
        <div id="msg" class="auth-msg"></div>
    </div>
</section>
<script>
function qs(name){
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
}
const token = '{{ token or "" }}' || qs('token');
const emailFromQuery = '{{ email or "" }}' || qs('email') || '';
document.getElementById('email').value = emailFromQuery;
let resetTicket = null;

async function postJson(path, body){
    const r = await fetch(path, { method:'POST', credentials:'same-origin', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    return r.json();
}

document.getElementById('doReset').addEventListener('click', async ()=>{
    const pw = document.getElementById('password').value;
    if(!pw){ document.getElementById('msg').textContent = 'Enter new password'; return; }
    if(!resetTicket && !token){ document.getElementById('msg').textContent = 'Verify OTP first'; return; }
    document.getElementById('doReset').disabled = true;
    const payload = resetTicket ? { reset_ticket: resetTicket, password: pw } : { token, password: pw };
    const res = await postJson('/reset-password', payload);
    document.getElementById('doReset').disabled = false;
    if(res.error){ document.getElementById('msg').textContent = res.error; return; }
    document.getElementById('msg').textContent = 'Password updated. Redirecting to login...';
    setTimeout(()=> window.location = '/login', 1200);
});

document.getElementById('verifyOtp').addEventListener('click', async ()=>{
    const email = document.getElementById('email').value.trim();
    const otp = document.getElementById('otp').value.trim();
    if(!email){ document.getElementById('msg').textContent = 'Enter email'; return; }
    if(!otp){ document.getElementById('msg').textContent = 'Enter OTP'; return; }

    document.getElementById('verifyOtp').disabled = true;
    const res = await postJson('/verify-reset-otp', { email, otp });
    document.getElementById('verifyOtp').disabled = false;

    if(res.error){ document.getElementById('msg').textContent = res.error; return; }

    resetTicket = res.reset_ticket;
    document.getElementById('passwordSection').style.display = 'block';
    document.getElementById('msg').textContent = 'OTP verified. You can now set a new password.';
});
</script>
</body>
</html>
