<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login — Resume Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="auth-shell">
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="AI Resume Analyzer logo" class="logo" />
                <h1>AI Resume Analyzer</h1>
            </div>
        </div>
    </nav>

    <section class="auth-wrap">
        <aside class="auth-info">
            <h2>🔐 Authentication</h2>
            <p>Secure access to your AI Resume Analyzer dashboard.</p>
            <ul class="auth-checklist">
                <li>✓ Glassmorphism card center layout</li>
                <li>✓ Dark modern dashboard look</li>
                <li>✓ OTP-based reset flow</li>
            </ul>
        </aside>

        <div class="auth-glass">
            <h1>Sign In</h1>
            <p class="auth-subtitle">Login to continue analysis and view your history.</p>

            <div class="form-group">
                <label>Email</label>
                <input id="email" type="email" placeholder="you@example.com" />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input id="password" type="password" placeholder="Your password" />
            </div>

            <div class="auth-actions">
                <button id="doLogin" class="auth-btn">Sign In</button>
            </div>

            <div class="auth-links">New customer? <a href="/signup">Create an account</a></div>
            <div class="auth-links"><a href="/forgot-password">Forgot password?</a></div>

            <div class="auth-msg" id="errorMsg" style="display:none;"></div>
            <div class="auth-msg" id="successMsg" style="display:none;"></div>
        </div>
    </section>

    <script>
        async function callApi(path, body) {
            const res = await fetch(path, {
                method: 'POST',
                credentials: 'same-origin',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(body)
            });
            return res.json();
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('errorMsg').style.borderColor = '#7f1d1d';
            document.getElementById('errorMsg').style.color = '#fecaca';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showSuccess(msg) {
            document.getElementById('successMsg').textContent = msg;
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('successMsg').style.borderColor = '#14532d';
            document.getElementById('successMsg').style.color = '#bbf7d0';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function clearMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        document.getElementById('doLogin').addEventListener('click', async () => {
            clearMessages();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showError('Email and password are required'); return; }

            document.getElementById('doLogin').disabled = true;
            const res = await callApi('/login', { username: email, password });
            document.getElementById('doLogin').disabled = false;
            if (res.error) { showError(res.error); return; }
            showSuccess('Logged in — redirecting...');
            setTimeout(() => window.location = '/', 600);
        });

        // Enter key support
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('doLogin').click();
        });
    </script>
</body>
</html>
