<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="auth-shell">
<nav class="navbar"><div class="container"><div class="nav-brand"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="AI Resume Analyzer logo" class="logo" /><h1>AI Resume Analyzer</h1></div></div></nav>
<section class="auth-wrap">
    <aside class="auth-info">
        <h2>🔐 Password Recovery</h2>
        <p>Secure OTP-based password reset with email verification.</p>
        <div class="auth-progress">
            <span class="step active">1</span><span class="line"></span><span class="step">2</span>
            <span>Request OTP → Verify & Reset</span>
        </div>
        <ul class="auth-checklist">
            <li>✓ OTP sent to registered email</li>
            <li>✓ Expires in 60 minutes</li>
            <li>✓ One-time use verification</li>
        </ul>
    </aside>
    <div class="auth-glass">
        <h2>Forgot Password</h2>
        <p class="auth-subtitle">Enter your registered email to receive an OTP.</p>
        <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
            <button id="sendReset" class="auth-btn">Send OTP</button>
        </div>
        <div id="msg" class="auth-msg"></div>
    </div>
</section>
<script>
async function postJson(path, body){
    const r = await fetch(path, { method:'POST', credentials:'same-origin', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    return r.json();
}

document.getElementById('sendReset').addEventListener('click', async ()=>{
    const email = document.getElementById('email').value.trim();
    if(!email){ document.getElementById('msg').textContent = 'Enter email'; return; }
    document.getElementById('sendReset').disabled = true;
    const res = await postJson('/forgot-password', { email });
    document.getElementById('sendReset').disabled = false;
    if(res.error){ document.getElementById('msg').textContent = res.error; return; }
    if (res.sent) {
        document.getElementById('msg').textContent = 'OTP sent to your email. Redirecting...';
        setTimeout(() => {
            window.location = '/reset-password?email=' + encodeURIComponent(email);
        }, 800);
        return;
    }

    if (res.otp) {
        document.getElementById('msg').textContent = 'Dev fallback OTP: ' + res.otp + ' — redirecting to reset page...';
        setTimeout(() => {
            window.location = '/reset-password?email=' + encodeURIComponent(email);
        }, 1000);
        return;
    }

    document.getElementById('msg').textContent = 'Reset requested. If this email exists, you will receive instructions.';
});
</script>
</body>
</html>
